<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Albion Online - Inspection Trainer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2694;</text></svg>">
  <style>
    :root {
      --bg: #0a0e17; --bg2: #111827; --card: #1a2234; --card2: #1f2b42;
      --border: #2a3a55; --glow: #4a7dff;
      --t1: #e8edf5; --t2: #8899bb; --t3: #556688;
      --gold: #f0b840; --gold-dim: #b8882a;
      --blue: #4a7dff; --blue-dim: #2a4d99;
      --green: #22c55e; --green-dim: #166534;
      --red: #ef4444; --red-dim: #991b1b;
      --purple: #a855f7; --orange: #f97316; --cyan: #06b6d4;
      --slot-bg: rgba(30,42,66,.85);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--t1); min-height:100dvh; overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 20% 50%,rgba(74,125,255,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(168,85,247,.05) 0%,transparent 50%); pointer-events:none; z-index:0; }
    .app { position:relative; z-index:1; max-width:420px; margin:0 auto; padding:6px; min-height:100dvh; }
    .screen { display:none; } .screen.active { display:block; }

    /* Header */
    .hdr { text-align:center; padding:8px 0 6px; border-bottom:1px solid var(--border); margin-bottom:6px; }
    .hdr h1 { font-size:1rem; font-weight:900; background:linear-gradient(135deg,var(--gold),#ffd700,var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:2px; text-transform:uppercase; }
    .hdr .sub { color:var(--t3); font-size:.55rem; } .hdr .sub a { color:var(--blue); text-decoration:none; }

    /* Config */
    .cfg { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin:10px auto; }
    .cfg h2 { font-size:.9rem; color:var(--gold); margin-bottom:10px; text-align:center; }
    .cg { margin-bottom:12px; }
    .cg label { display:block; font-size:.65rem; font-weight:600; color:var(--t2); text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
    .cg .hint { font-size:.55rem; color:var(--t3); margin-top:2px; text-transform:none; letter-spacing:0; }
    .cg input[type=range] { width:100%; height:5px; -webkit-appearance:none; appearance:none; background:var(--border); border-radius:3px; outline:none; }
    .cg input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--gold); cursor:pointer; box-shadow:0 0 8px rgba(240,184,64,.4); }
    .crow { display:flex; align-items:center; gap:8px; }
    .crow input[type=range] { flex:1; }
    .cval { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:2px 8px; font-weight:700; color:var(--gold); font-size:.85rem; min-width:32px; text-align:center; }
    .csel { width:100%; padding:7px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--t1); font-size:.8rem; outline:none; }

    /* Buttons */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:9px 18px; border:none; border-radius:8px; font-size:.8rem; font-weight:700; cursor:pointer; transition:all .2s; text-transform:uppercase; letter-spacing:1px; }
    .btn-p { background:linear-gradient(135deg,var(--gold),#ffd700); color:#1a1000; box-shadow:0 4px 16px rgba(240,184,64,.3); }
    .btn-p:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(240,184,64,.5); }
    .btn-s { background:var(--card); border:1px solid var(--border); color:var(--t1); }
    .btn-s:hover { border-color:var(--blue); }
    .btn-d { background:rgba(239,68,68,.15); border:1px solid var(--red); color:var(--red); padding:5px 9px; font-size:.65rem; }
    .btn-g { background:linear-gradient(135deg,var(--green),#16a34a); color:#fff; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }

    /* Training top bar */
    .tbar { display:flex; justify-content:space-between; align-items:center; padding:6px 10px; background:var(--card); border:1px solid var(--border); border-radius:8px; margin-bottom:4px; }
    .tstats { display:flex; gap:14px; }
    .si { text-align:center; }
    .si .sl { font-size:.5rem; text-transform:uppercase; letter-spacing:1px; color:var(--t3); }
    .si .sv { font-size:1rem; font-weight:700; }
    .sv.sc { color:var(--gold); } .sv.rn { color:var(--blue); } .sv.sk { color:var(--green); }

    /* Timer */
    .tbc { width:100%; height:5px; background:var(--border); border-radius:3px; margin-bottom:4px; overflow:hidden; }
    .tb { height:100%; border-radius:3px; transition:width .1s linear; background:linear-gradient(90deg,var(--green),var(--gold),var(--red)); }
    .tb.urg { animation:pb .5s ease-in-out infinite; }
    @keyframes pb { 0%,100%{opacity:1} 50%{opacity:.6} }

    /* Phase */
    .phase { text-align:center; margin-bottom:4px; padding:6px; border-radius:6px; font-size:.7rem; font-weight:600; text-transform:uppercase; letter-spacing:2px; }
    .ph-m { background:rgba(74,125,255,.15); border:1px solid var(--blue); color:var(--blue); }
    .ph-a { background:rgba(240,184,64,.15); border:1px solid var(--gold); color:var(--gold); }
    .ph-c { background:rgba(34,197,94,.15); border:1px solid var(--green); color:var(--green); }
    .ph-w { background:rgba(239,68,68,.15); border:1px solid var(--red); color:var(--red); }

    /* ====== INSPECTION GRID (in-game style) ====== */
    .bc { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:4px; }
    .bc-top { padding:6px 10px; background:linear-gradient(135deg,rgba(74,125,255,.15),rgba(168,85,247,.15)); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .bc-top h3 { font-size:.75rem; font-weight:700; display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
    .bc-ct { font-size:.55rem; padding:2px 7px; border-radius:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; }
    .ct-sp { background:rgba(239,68,68,.2); color:var(--red); border:1px solid var(--red-dim); }
    .ct-gp { background:rgba(34,197,94,.2); color:var(--green); border:1px solid var(--green-dim); }
    .ct-spv { background:rgba(74,125,255,.2); color:var(--blue); border:1px solid var(--blue-dim); }
    .ct-gpv { background:rgba(168,85,247,.2); color:var(--purple); border:1px solid rgba(168,85,247,.3); }
    .ct-zvz { background:rgba(249,115,22,.2); color:var(--orange); border:1px solid rgba(249,115,22,.3); }
    .ct-ss { background:rgba(6,182,212,.2); color:var(--cyan); border:1px solid rgba(6,182,212,.3); }
    .ct-gk { background:rgba(239,68,68,.2); color:#ff6b6b; border:1px solid rgba(239,68,68,.3); }
    .ct-hg { background:rgba(168,85,247,.2); color:#c084fc; border:1px solid rgba(168,85,247,.3); }
    .ct-ar { background:rgba(240,184,64,.2); color:var(--gold); border:1px solid var(--gold-dim); }
    .ct-av { background:rgba(6,182,212,.2); color:var(--cyan); border:1px solid rgba(6,182,212,.3); }
    .ct-ow { background:rgba(34,197,94,.2); color:var(--green); border:1px solid var(--green-dim); }

    /* 3x3 Inspection Grid */
    .insp-grid {
      display: flex; justify-content: center;
      padding: 8px 4px 12px; gap: 0;
    }
    .insp-col { display:flex; flex-direction:column; }
    .insp-col-lr { margin-top: 18px; }
    .insp-slot {
      position: relative; width: 90px; height: 90px;
    }
    .insp-slot img.item-img {
      width: 90px; height: 90px; object-fit: contain;
      image-rendering: auto;
    }
    /* Empty slot X icon */
    .insp-slot.empty {
      display:flex; align-items:center; justify-content:center;
      background: var(--slot-bg); border: 1px solid var(--border); border-radius: 4px;
    }
    .insp-slot.empty svg { opacity: .3; }

    /* Skill circles overlaid at bottom of slot */
    .sk-overlay {
      position: absolute; bottom: -6px; left: 0; right: 0;
      display: flex; flex-direction: row; justify-content: center;
      gap: 0; width: 100%;
    }
    .sk-circle {
      width: 28px; height: 28px; border-radius: 50%;
      overflow: hidden; border: 2px solid var(--card);
      box-shadow: 0 1px 4px rgba(0,0,0,.5);
      position: relative; z-index: 3;
    }
    .sk-circle + .sk-circle {
      margin-left: -4px; z-index: 2;
    }
    .sk-circle + .sk-circle + .sk-circle {
      margin-left: -4px; z-index: 1;
    }
    .sk-circle img {
      width: 100%; height: 100%; object-fit: contain; image-rendering: auto;
    }
    /* Skill slot indicator border colors */
    .sk-circle.sk-q { border-color: var(--blue); }
    .sk-circle.sk-w { border-color: var(--purple); }
    .sk-circle.sk-e { border-color: var(--gold); }
    .sk-circle.sk-p { border-color: var(--green); }

    /* Item label below slot */
    .slot-label {
      font-size: .45rem; text-align:center; color:var(--t2);
      margin-top: 2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width: 90px; line-height: 1.1;
    }

    /* Consumables row below grid */
    .cons-row {
      display: flex; justify-content: center; gap: 10px;
      padding: 4px 10px 8px; border-top: 1px solid var(--border);
    }
    .cons-item { text-align: center; }
    .cons-item img {
      width: 40px; height: 40px; object-fit: contain; image-rendering: auto;
    }
    .cons-label {
      font-size: .4rem; color: var(--t2); margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 50px;
    }

    /* Range badge in top bar */
    .rng { display:inline-flex; align-items:center; gap:3px; padding:1px 6px; border-radius:8px; font-size:.55rem; font-weight:600; }
    .rng-m { background:rgba(239,68,68,.15); color:var(--red); border:1px solid rgba(239,68,68,.3); }
    .rng-md { background:rgba(240,184,64,.15); color:var(--gold); border:1px solid var(--gold-dim); }
    .rng-r { background:rgba(74,125,255,.15); color:var(--blue); border:1px solid rgba(74,125,255,.3); }

    /* Tree badge */
    .tb { display:inline-block; padding:1px 5px; border-radius:3px; font-size:.5rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
    .tb-sword{background:rgba(239,68,68,.15);color:#f87171} .tb-axe{background:rgba(249,115,22,.15);color:#fb923c}
    .tb-mace{background:rgba(74,125,255,.15);color:#60a5fa} .tb-dagger{background:rgba(168,85,247,.15);color:#c084fc}
    .tb-qs{background:rgba(239,68,68,.15);color:#f87171} .tb-spear{background:rgba(34,197,94,.15);color:#4ade80}
    .tb-nature{background:rgba(34,197,94,.15);color:#4ade80} .tb-holy{background:rgba(240,184,64,.15);color:#fbbf24}
    .tb-fire{background:rgba(249,115,22,.15);color:#fb923c} .tb-frost{background:rgba(6,182,212,.15);color:#22d3ee}
    .tb-arcane{background:rgba(168,85,247,.15);color:#c084fc} .tb-cursed{background:rgba(168,85,247,.15);color:#a78bfa}
    .tb-bow{background:rgba(34,197,94,.15);color:#4ade80} .tb-crossbow{background:rgba(74,125,255,.15);color:#60a5fa}

    /* Hidden state - blur/redact names and skill icons */
    .bc.hid .slot-label { color:transparent; background:var(--border); border-radius:2px; }
    .bc.hid .cons-label { color:transparent; background:var(--border); border-radius:2px; }
    .bc.hid .sk-circle img { opacity:0; }
    .bc.hid .bc-top h3 { color:transparent; background:var(--border); border-radius:3px; }

    /* Quiz */
    .qp { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:6px; }
    .qq { font-size:.8rem; font-weight:600; margin-bottom:10px; color:var(--gold); line-height:1.4; }
    .qq .qskill { display:inline-flex; align-items:center; gap:4px; background:rgba(74,125,255,.15); border:1px solid rgba(74,125,255,.3); border-radius:6px; padding:2px 8px; color:var(--blue); font-weight:700; }
    .qq .qskill img { width:18px; height:18px; border-radius:3px; object-fit:contain; image-rendering:auto; }
    .qo { display:grid; grid-template-columns:1fr; gap:6px; margin-bottom:10px; }
    .qob { padding:9px 10px; background:var(--bg); border:2px solid var(--border); border-radius:8px; cursor:pointer; transition:all .2s; font-size:.75rem; font-weight:500; text-align:left; line-height:1.3; color:var(--t1); }
    .qob:hover:not(.dis) { border-color:var(--blue); background:rgba(74,125,255,.06); }
    .qob.sel { border-color:var(--blue); background:rgba(74,125,255,.12); }
    .qob.ok { border-color:var(--green)!important; background:rgba(34,197,94,.12)!important; color:var(--green); }
    .qob.no { border-color:var(--red)!important; background:rgba(239,68,68,.12)!important; color:var(--red); }
    .qob.dis { cursor:not-allowed; opacity:.5; }
    .qob .okk { display:inline-block; width:18px; height:18px; line-height:18px; text-align:center; background:var(--border); border-radius:4px; font-size:.6rem; font-weight:700; margin-right:5px; }
    .qob.ok .okk { background:var(--green); color:#fff; }
    .qob.no .okk { background:var(--red); color:#fff; }

    /* Results */
    .rp { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin:12px auto; text-align:center; }
    .rp-title { font-size:1.2rem; font-weight:900; margin-bottom:4px; }
    .rp-grade { font-size:3rem; font-weight:900; margin:10px 0; font-family:system-ui; }
    .gs { color:var(--gold); text-shadow:0 0 20px rgba(240,184,64,.5); }
    .ga { color:var(--green); } .gb { color:var(--blue); } .gc { color:var(--orange); } .gdg { color:var(--red); }
    .rs { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:12px 0; }
    .rsi { padding:10px 6px; background:var(--bg); border-radius:8px; border:1px solid var(--border); }
    .rsi .rv { font-size:1.3rem; font-weight:700; }
    .rsi .rl { font-size:.5rem; color:var(--t3); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
    .rb { text-align:left; margin-top:14px; max-height:40vh; overflow-y:auto; }
    .rb h4 { font-size:.65rem; text-transform:uppercase; letter-spacing:1px; color:var(--t3); margin-bottom:6px; }
    .bi { display:flex; align-items:center; gap:6px; padding:6px; background:var(--bg); border-radius:6px; margin-bottom:3px; border:1px solid var(--border); }
    .bic { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.65rem; font-weight:700; flex-shrink:0; }
    .bic.cic { background:rgba(34,197,94,.2); color:var(--green); }
    .bic.wic { background:rgba(239,68,68,.2); color:var(--red); }
    .bit { flex:1; min-width:0; }
    .biq { font-size:.65rem; font-weight:500; } .bia { font-size:.55rem; color:var(--t2); margin-top:1px; }
    .ra { display:flex; gap:8px; justify-content:center; margin-top:14px; }

    /* Countdown */
    .cov { position:fixed; inset:0; background:rgba(10,14,23,.9); display:none; align-items:center; justify-content:center; z-index:100; }
    .cov.act { display:flex; }
    .cn { font-size:5rem; font-weight:900; color:var(--gold); text-shadow:0 0 40px rgba(240,184,64,.5); animation:cp 1s ease-in-out; }
    @keyframes cp { 0%{transform:scale(1.5);opacity:0} 50%{transform:scale(1);opacity:1} 100%{transform:scale(.9);opacity:.8} }

    .fade-in { animation:fi .3s ease; }
    @keyframes fi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* Scrollbar */
    ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  </style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <h1>Inspection Trainer</h1>
    <p class="sub">Quick-recognize Albion Online builds &mdash; <a href="https://albiononlinegrind.com/builds" target="_blank">Ref</a></p>
  </header>

  <!-- Config -->
  <div id="s-cfg" class="screen active">
    <div class="cfg fade-in">
      <h2>Training Setup</h2>
      <div class="cg">
        <label>Display Time</label>
        <div class="crow"><input type="range" id="c-dt" min="2" max="15" value="5" step="1"><span class="cval" id="c-dt-v">5s</span></div>
        <div class="hint">Seconds to memorize the build</div>
      </div>
      <div class="cg">
        <label>Rounds</label>
        <div class="crow"><input type="range" id="c-rn" min="3" max="30" value="10" step="1"><span class="cval" id="c-rn-v">10</span></div>
        <div class="hint">Total builds to inspect</div>
      </div>
      <div class="cg">
        <label>Answer Time</label>
        <div class="crow"><input type="range" id="c-at" min="5" max="30" value="10" step="1"><span class="cval" id="c-at-v">10s</span></div>
        <div class="hint">Seconds to answer</div>
      </div>
      <div class="cg">
        <label>Difficulty</label>
        <select id="c-diff" class="csel">
          <option value="easy">Easy &mdash; 3 choices</option>
          <option value="medium" selected>Medium &mdash; 4 choices</option>
          <option value="hard">Hard &mdash; 4 choices, similar skills</option>
        </select>
      </div>
      <div style="text-align:center;margin-top:14px;">
        <button class="btn btn-p" id="btn-start" style="width:100%">Start Training</button>
      </div>
    </div>
  </div>

  <!-- Training -->
  <div id="s-train" class="screen">
    <div class="tbar">
      <div class="tstats">
        <div class="si"><div class="sl">Round</div><div class="sv rn" id="st-rn">1/10</div></div>
        <div class="si"><div class="sl">Score</div><div class="sv sc" id="st-sc">0</div></div>
        <div class="si"><div class="sl">Streak</div><div class="sv sk" id="st-sk">0</div></div>
      </div>
      <button class="btn btn-d" id="btn-quit">Quit</button>
    </div>
    <div class="tbc"><div class="tb" id="tbar" style="width:100%"></div></div>
    <div class="phase ph-m" id="phase">Memorize</div>
    <div class="bc" id="bc"></div>
    <div class="qp" id="qp" style="display:none">
      <div class="qq" id="qq"></div>
      <div class="qo" id="qo"></div>
      <div style="text-align:center"><button class="btn btn-g" id="btn-next" style="display:none;width:100%">Next</button></div>
    </div>
  </div>

  <!-- Results -->
  <div id="s-res" class="screen">
    <div class="rp fade-in" id="rp"></div>
  </div>

  <!-- Countdown -->
  <div class="cov" id="cov"><div class="cn" id="cn">3</div></div>
</div>

<script>
// ===== RENDER API =====
const R_BASE = 'https://render.albiononline.com/v1';
function itemImg(id) { return `${R_BASE}/item/${encodeURIComponent(id)}.png?locale=en`; }
function spellImg(name) { return `${R_BASE}/spell/${encodeURIComponent(name)}.png?locale=en`; }

// Item IDs for render API
const ITEM_IDS = {
  'Bloodmoon Staff': "Adept's Bloodmoon Staff",
  'Battleaxe': "Adept's Battleaxe",
  'Nature Staff': "Adept's Nature Staff",

  'Dagger Pair': "Adept's Dagger Pair",
  'Fists of Avalon': "Adept's Fists of Avalon",
  'Light Crossbow': "Adept's Light Crossbow",
  'Bear Paws': "Adept's Bear Paws",
  'Spear': "Adept's Spear",
  'Bow of Badon': "Adept's Bow of Badon",
  'Cursed Staff': "Adept's Cursed Staff",
  'Prowling Staff': "Adept's Prowling Staff",
  'Carving Sword': "Adept's Carving Sword",
  'Shadowcaller': "Adept's Shadowcaller",
  'Incubus Mace': "Adept's Incubus Mace",
  'Fire Staff': "Adept's Fire Staff",
  'Druidic Staff': "Adept's Druidic Staff",
  'Earthrune Staff': "Adept's Earthrune Staff",
  'Hallowfall': "Adept's Hallowfall",
  'Bloodletter': "Adept's Bloodletter",
  'Demonic Staff': "Adept's Demonic Staff",
  'Infinity Blade': "Adept's Infinity Blade",
  'Boltcasters': "Adept's Boltcasters",
  'Holy Staff': "Adept's Holy Staff",
  'Spirithunter': "Adept's Spirithunter",
  '1H Spear': "Adept's Spear",
  'Great Frost': "Adept's Great Frost Staff",
  'Claymore': "Adept's Claymore",
  'Ironroot Staff': "Adept's Ironroot Staff",
  'Galatine Pair': "Adept's Galatine Pair",
  'Frost Staff': "Adept's Frost Staff",
  'Heavy Crossbow': "Adept's Heavy Crossbow",
  'Greataxe': "Adept's Greataxe",
  'Brimstone Staff': "Adept's Brimstone Staff",
  'Halberd': "Adept's Halberd",
  'Black Monk Staff': "Adept's Black Monk Staff",

// ===== STATE =====
const S = {
  cfg: { dt:5, rounds:10, at:10, diff:'medium' },
  round:0, score:0, streak:0, best:0,
  builds:[], build:null, question:null,
  phase:'config', timer:null, atimer:null, results:[]
};

// ===== DOM =====
const $=id=>document.getElementById(id);

// ===== INIT =====
function init() {
  [['c-dt','c-dt-v','dt','s'],['c-rn','c-rn-v','rounds',''],['c-at','c-at-v','at','s']].forEach(([sid,vid,key,suf])=>{
    $(sid).addEventListener('input',()=>{ S.cfg[key]=+$(sid).value; $(vid).textContent=$(sid).value+suf; });
  });
  $('c-diff').addEventListener('change',e=>S.cfg.diff=e.target.value);
  $('btn-start').addEventListener('click',startTraining);
  $('btn-quit').addEventListener('click',quit);
  $('btn-next').addEventListener('click',nextRound);

  document.addEventListener('keydown',e=>{
    if(S.phase==='answer') {
      const map={a:0,b:1,c:2,d:3};
      if(map[e.key.toLowerCase()]!==undefined) {
        const opts=document.querySelectorAll('.qob:not(.dis)');
        if(opts[map[e.key.toLowerCase()]]) opts[map[e.key.toLowerCase()]].click();
      }
    }
    if(e.key==='Enter') $('btn-next').click();
  });
}

function showScreen(id) { ['s-cfg','s-train','s-res'].forEach(s=>$(s).classList.remove('active')); $(id).classList.add('active'); }

function startTraining() {
  S.round=0; S.score=0; S.streak=0; S.best=0; S.results=[];
  const shuffled=[...BUILDS].sort(()=>Math.random()-.5);
  S.builds=shuffled.slice(0,S.cfg.rounds);
  showScreen('s-train'); updStats(); countdown();
}

function countdown() {
  $('cov').classList.add('act'); let c=3; $('cn').textContent=c;
  const iv=setInterval(()=>{
    c--;
    if(c>0){ $('cn').textContent=c; $('cn').style.animation='none'; void $('cn').offsetWidth; $('cn').style.animation='cp 1s ease-in-out'; }
    else{ clearInterval(iv); $('cov').classList.remove('act'); startRound(); }
  },800);
}

function startRound() {
  S.round++; S.build=S.builds[S.round-1];
  updStats(); renderBuild(S.build,false); showMemorize();
}

function showMemorize() {
  S.phase='memorize';
  $('qp').style.display='none';
  $('phase').className='phase ph-m'; $('phase').textContent=`Memorize (${S.cfg.dt}s)`;
  $('bc').classList.remove('hid');
  let left=S.cfg.dt; $('tbar').style.width='100%'; $('tbar').classList.remove('urg');
  S.timer=setInterval(()=>{
    left-=.1; const p=Math.max(0,left/S.cfg.dt*100); $('tbar').style.width=p+'%';
    if(p<30)$('tbar').classList.add('urg');
    if(left<=0){ clearInterval(S.timer); showAnswer(); }
  },100);
}

function showAnswer() {
  S.phase='answer';
  $('bc').classList.add('hid');
  $('phase').className='phase ph-a'; $('phase').textContent='What does this skill do?';
  $('tbar').style.width='100%'; $('tbar').classList.remove('urg');
  S.question=genQuestion(S.build);
  $('qp').style.display='block'; $('qp').classList.add('fade-in');
  $('btn-next').style.display='none';
  renderQuestion();

  if(S.cfg.at>0) {
    let left=S.cfg.at;
    S.atimer=setInterval(()=>{
      left-=.1; const p=Math.max(0,left/S.cfg.at*100); $('tbar').style.width=p+'%';
      if(p<30)$('tbar').classList.add('urg');
      if(left<=0){ clearInterval(S.atimer); handleTimeout(); }
    },100);
  }
}

function genQuestion(build) {
  const skills = [
    { slot:'Q', name:build.qSkill },
    { slot:'W', name:build.wSkill },
    { slot:'E', name:build.eSkill }
  ];
  const pick = skills[Math.floor(Math.random()*skills.length)];
  const correctDesc = SKILL_DESC[pick.name] || 'Deals damage to the target enemy';

  const allDescs = Object.values(SKILL_DESC).filter(d => d !== correctDesc);
  const shuffledDescs = allDescs.sort(()=>Math.random()-.5);
  const numOpts = S.cfg.diff==='easy'?3:4;

  let distractors;
  if(S.cfg.diff==='hard') {
    const sameTree = BUILDS.filter(b=>b.tree===build.tree);
    const sameTreeSkills = [];
    sameTree.forEach(b=>{
      [b.qSkill,b.wSkill,b.eSkill].forEach(sk=>{
        if(sk!==pick.name && SKILL_DESC[sk]) sameTreeSkills.push(SKILL_DESC[sk]);
      });
    });
    const sameTreeShuffled = sameTreeSkills.filter(d=>d!==correctDesc).sort(()=>Math.random()-.5);
    distractors = [...sameTreeShuffled.slice(0,numOpts-1)];
    let idx=0;
    while(distractors.length<numOpts-1 && idx<shuffledDescs.length) {
      if(!distractors.includes(shuffledDescs[idx])) distractors.push(shuffledDescs[idx]);
      idx++;
    }
  } else {
    distractors = shuffledDescs.slice(0,numOpts-1);
  }

  const options = [correctDesc, ...distractors].sort(()=>Math.random()-.5);
  return { slot:pick.slot, name:pick.name, correctDesc, options };
}

function renderQuestion() {
  const q = S.question;
  $('qq').innerHTML = `What does <span class="qskill"><img src="${spellImg(q.name)}" alt="" onerror="this.style.display='none'">${q.name}</span> do?`;

  const keys = ['A','B','C','D'];
  $('qo').innerHTML = '';
  q.options.forEach((opt,i) => {
    const btn = document.createElement('button');
    btn.className = 'qob';
    btn.dataset.idx = i;
    btn.dataset.isCorrect = opt === q.correctDesc ? '1' : '0';
    btn.innerHTML = `<span class="okk">${keys[i]}</span>${opt}`;
    btn.addEventListener('click', () => handleAnswer(opt, btn));
    $('qo').appendChild(btn);
  });
}

function handleAnswer(selected, btnEl) {
  clearInterval(S.atimer);
  const q = S.question;
  const isCorrect = selected === q.correctDesc;

  document.querySelectorAll('.qob').forEach(btn => {
    btn.classList.add('dis');
    if(btn.dataset.isCorrect === '1') btn.classList.add('ok');
  });

  if(!isCorrect) btnEl.classList.add('no');

  if(isCorrect) {
    S.score++; S.streak++; if(S.streak>S.best) S.best=S.streak;
    $('phase').className='phase ph-c'; $('phase').textContent='Correct!';
  } else {
    S.streak=0;
    $('phase').className='phase ph-w'; $('phase').textContent='Wrong!';
  }

  S.results.push({ round:S.round, build:S.build.name, skillName:q.name, slot:q.slot, correct:isCorrect, userDesc:selected.substring(0,60), correctDesc:q.correctDesc.substring(0,60) });
  updStats(); $('tbar').style.width='0%';

  $('btn-next').style.display='inline-flex';
  $('btn-next').textContent = S.round>=S.cfg.rounds ? 'See Results' : 'Next Round';
}

function handleTimeout() {
  const q = S.question;
  document.querySelectorAll('.qob').forEach(btn => {
    btn.classList.add('dis');
    if(btn.dataset.isCorrect === '1') btn.classList.add('ok');
  });
  S.streak=0;
  S.results.push({ round:S.round, build:S.build.name, skillName:q.name, slot:q.slot, correct:false, userDesc:'(Time out)', correctDesc:q.correctDesc.substring(0,60) });
  $('phase').className='phase ph-w'; $('phase').textContent="Time's up!";
  updStats(); $('tbar').style.width='0%';
  $('btn-next').style.display='inline-flex';
  $('btn-next').textContent = S.round>=S.cfg.rounds ? 'See Results' : 'Next Round';
}

function nextRound() {
  if(S.round>=S.cfg.rounds) showResults();
  else countdown();
}

function updStats() {
  $('st-rn').textContent=`${S.round}/${S.cfg.rounds}`;
  $('st-sc').textContent=S.score;
  $('st-sk').textContent=S.streak;
}

// ===== IN-GAME INSPECTION GRID RENDER =====
function renderBuild(b, hidden) {
  // Skill circle HTML
  const skCircle = (name, cls) => {
    if(!name) return '';
    return `<div class="sk-circle ${cls}"><img src="${spellImg(name)}" alt="${name}" onerror="this.style.display='none'"></div>`;
  };

  // Item slot HTML
  const slot = (itemId, label, skills=[]) => {
    const id = ITEM_IDS[itemId];
    if(!id) return `<div class="insp-slot empty"><svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#6c757d" stroke-width="1"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div><div class="slot-label">${label}</div>`;
    const skillHtml = skills.length ? `<div class="sk-overlay">${skills.map(s => skCircle(s.name, s.cls)).join('')}</div>` : '';
    return `<div class="insp-slot"><img class="item-img" src="${itemImg(id)}" alt="${label}" loading="lazy">${skillHtml}</div><div class="slot-label">${label}</div>`;
  };

  // Weapon skills (Q, W, passive)
  const wpnSkills = [
    { name: b.qSkill, cls: 'sk-q' },
    { name: b.wSkill, cls: 'sk-w' },
    { name: b.passive, cls: 'sk-p' }
  ];

  // Armor skills (active, passive)
  const headSkills = [
    ...(b.headSkills||[]).map(n=>({name:n,cls:'sk-q'})),
    ...(b.headPassive?[{name:b.headPassive,cls:'sk-p'}]:[])
  ];
  const chestSkills = [
    ...(b.chestSkills||[]).map(n=>({name:n,cls:'sk-q'})),
    ...(b.chestPassive?[{name:b.chestPassive,cls:'sk-p'}]:[])
  ];
  const shoesSkills = [
    ...(b.shoesSkills||[]).map(n=>({name:n,cls:'sk-q'})),
    ...(b.shoesPassive?[{name:b.shoesPassive,cls:'sk-p'}]:[])
  ];

  $('bc').innerHTML = `
    <div class="bc-top">
      <h3><span class="tb ${b.tc}">${b.tree}</span> <span class="bc-name">${b.weapon}</span></h3>
      <span style="display:flex;align-items:center;gap:4px"><span class="rng ${b.rc}">${b.range}</span><span class="bc-ct ${b.cc}">${b.ct}</span></span>
    </div>
    <div class="insp-grid">
      <!-- Left column: Cape, Weapon, Potion -->
      <div class="insp-col insp-col-lr">
        ${slot(b.cape, b.cape)}
        ${slot(b.weapon, b.weapon, wpnSkills)}
        ${slot(b.potion, b.potion)}
      </div>
      <!-- Center column: Head, Chest, Shoes -->
      <div class="insp-col">
        ${slot(b.head, b.head, headSkills)}
        ${slot(b.chest, b.chest, chestSkills)}
        ${slot(b.shoes, b.shoes, shoesSkills)}
      </div>
      <!-- Right column: empty, Food, Mount -->
      <div class="insp-col insp-col-lr">
        <div class="insp-slot empty"><svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#6c757d" stroke-width="1"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div><div class="slot-label">Offhand</div>
        ${slot(b.food, b.food)}
        ${slot(b.mount, b.mount)}
      </div>
    </div>`;
}

function showResults() {
  clearInterval(S.timer); clearInterval(S.atimer);
  showScreen('s-res');
  const total=S.results.length, correct=S.results.filter(r=>r.correct).length;
  const pct=Math.round(correct/total*100);
  let grade,gc;
  if(pct>=90){grade='S';gc='gs';}else if(pct>=75){grade='A';gc='ga';}else if(pct>=60){grade='B';gc='gb';}else if(pct>=40){grade='C';gc='gc';}else{grade='D';gc='gdg';}

  const bd = S.results.map(r=>`
    <div class="bi">
      <div class="bic ${r.correct?'cic':'wic'}">${r.correct?'&#10003;':'&#10007;'}</div>
      <div class="bit"><div class="biq">R${r.round}: ${r.build}</div><div class="bia">What does ${r.skillName} do? ${r.correct?'':'Correct: '+r.correctDesc}</div></div>
    </div>`).join('');

  $('rp').innerHTML = `
    <div class="rp-title">Training Complete</div>
    <div class="rp-grade ${gc}">${grade}</div>
    <div style="color:var(--t2);margin-bottom:6px">${pct}% Accuracy</div>
    <div class="rs">
      <div class="rsi"><div class="rv" style="color:var(--green)">${correct}/${total}</div><div class="rl">Correct</div></div>
      <div class="rsi"><div class="rv" style="color:var(--gold)">${S.best}</div><div class="rl">Best Streak</div></div>
      <div class="rsi"><div class="rv" style="color:var(--blue)">${S.cfg.rounds}</div><div class="rl">Rounds</div></div>
    </div>
    <div class="rb"><h4>Breakdown</h4>${bd}</div>
    <div class="ra"><button class="btn btn-p" onclick="startTraining()">Again</button><button class="btn btn-s" onclick="showScreen('s-cfg')">Settings</button></div>`;
}

function quit() {
  clearInterval(S.timer); clearInterval(S.atimer);
  S.results.length>0 ? showResults() : showScreen('s-cfg');
}

init();
</script>
</body>
</html>
